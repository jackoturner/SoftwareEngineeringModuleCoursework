services:
  app:
    build: .
    container_name: tapthat_app
    ports:
      - "3000:3000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - DB_HOST=db
      - DB_USER=tapuser
      - DB_PASSWORD=tappass
      - DB_NAME=tapthat
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: tapthat_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: tapthat
      MYSQL_USER: tapuser
      MYSQL_PASSWORD: tappass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: tapthat_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: example
    depends_on:
      - db

volumes:
  db_data: